<div class="card shadow-sm border-0 mb-5 bg-white">
  <div class="card-body p-4">
    <h4 class="card-title fw-bold mb-4 text-dark border-bottom pb-3">
      <i class="bi bi-pencil-square me-2"></i>Rédiger un article
    </h4>
    
    <form [formGroup]="postForm" (ngSubmit)="onSubmit()">
      <div class="row g-4">
        
        <div class="col-md-8">
          <label class="form-label fw-bold text-secondary small">TITRE</label>
          <input type="text" formControlName="title" class="form-control" 
                 [class.is-invalid]="isInvalid('title')"
                 placeholder="Au moins 5 caractères...">
          <div class="invalid-feedback" *ngIf="postForm.get('title')?.errors?.['required']">Le titre est obligatoire.</div>
          <div class="invalid-feedback" *ngIf="postForm.get('title')?.errors?.['minlength']">Le titre doit faire au moins 5 caractères.</div>
        </div>

        <div class="col-md-4">
          <label class="form-label fw-bold text-secondary small">CATÉGORIE</label>
          <select formControlName="categoryId" class="form-select" [class.is-invalid]="isInvalid('categoryId')">
            <option value="" disabled selected>Choisir une catégorie...</option>
            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
          </select>
          <div class="invalid-feedback">Veuillez sélectionner une catégorie.</div>
        </div>

        <div class="col-12">
          <label class="form-label fw-bold text-secondary small">CONTENU (Max 2500 caractères)</label>
          <textarea formControlName="content" class="form-control" rows="8" 
                    [class.is-invalid]="isInvalid('content')"
                    placeholder="Exprimez-vous..."></textarea>
          <div class="invalid-feedback" *ngIf="postForm.get('content')?.errors?.['required']">Le contenu ne peut pas être vide.</div>
          <div class="invalid-feedback" *ngIf="postForm.get('content')?.errors?.['maxlength']">Le contenu dépasse la limite autorisée.</div>
          
          <div class="text-end small mt-1 text-muted">
            {{ postForm.get('content')?.value?.length || 0 }} / 2500
          </div>
        </div>

        <div class="col-12 text-end border-top pt-3">
          <a routerLink="/" class="btn btn-light me-2">Annuler</a>
          <button type="submit" class="btn btn-primary px-5 fw-bold" [disabled]="postForm.invalid">
            Publier l'article
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
