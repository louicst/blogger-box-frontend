<div class="container my-5" *ngIf="!isLoading && post">
  
  <a routerLink="/" class="btn btn-light text-secondary mb-4 shadow-sm border-0">
    <i class="bi bi-arrow-left me-2"></i>Retour à l'accueil
  </a>

  <div class="card shadow-sm border-0 bg-white">
    <div class="card-body p-5">
      
      <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <span class="badge bg-primary-subtle text-primary border border-primary-subtle fs-6 px-3 py-2">
          {{ post.category ? post.category.name : 'Sans catégorie' }}
        </span>
        <div class="text-muted">
          <i class="bi bi-calendar3 me-1"></i>
          {{ post.createdDate | date:'longDate' }}
        </div>
      </div>

      <h1 class="card-title fw-bold text-dark mb-4">{{ post.title }}</h1>
      
      <p class="card-text text-secondary lh-lg fs-5" style="white-space: pre-wrap;">
        {{ post.content }}
      </p>

    </div>
  </div>
</div>

<div class="text-center py-5" *ngIf="isLoading">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Chargement...</span>
  </div>
</div>

<div class="text-center py-5 text-muted" *ngIf="!isLoading && !post">
  <i class="bi bi-exclamation-triangle fs-1 text-warning"></i>
  <p class="mt-3 fs-5">Oups ! Cet article n'existe pas ou a été supprimé.</p>
  <a routerLink="/" class="btn btn-primary mt-2">Retour à l'accueil</a>
</div>
